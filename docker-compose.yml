version: '3.8'

services:
  db:
    image: mysql:8.0 # O puedes usar mysql:latest
    container_name: mi-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 12345
      MYSQL_DATABASE: mri
      MYSQL_USER: nicolas
      MYSQL_PASSWORD: 12345
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: